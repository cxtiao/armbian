name: Build H618 Phoenix Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
          git curl wget gcc g++ bc bison flex \
          make libssl-dev libncurses5-dev libncursesw5-dev \
          libreadline-dev ccache fakeroot libfile-fcntllock-perl \
          lzop dosfstools device-tree-compiler \
          python3 python3-distutils \
          qemu-user-static binfmt-support \
          parted kpartx e2fsprogs

      - name: Clone Armbian build repository
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build

      - name: Build Armbian firmware for H618
        run: |
          cd armbian-build
          sudo ./compile.sh \
            BOARD=orangepizero3 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=gzip \
            BSPFREEZE=yes
        timeout-minutes: 240

      - name: Extract Armbian rootfs
        run: |
          mkdir work
          cd work

          IMG=$(ls ../armbian-build/output/images/*.img.gz | head -n1)

          echo "Found image: $IMG"

          gunzip $IMG
          IMG_FILE=$(ls *.img)

          sudo losetup -Pf $IMG_FILE
          LOOP=$(losetup -a | grep $IMG_FILE | cut -d: -f1)

          mkdir rootfs
          sudo mount ${LOOP}p2 rootfs

          sudo tar czf rootfs.tar.gz -C rootfs .

          sudo umount rootfs
          sudo losetup -d $LOOP

      - name: Clone sunxi pack tools
        run: |
          git clone https://github.com/longsleep/sunxi-pack-tools.git

      - name: Create Phoenix image
        run: |
          mkdir phoenix
          cp work/rootfs.tar.gz phoenix/

          cd sunxi-pack-tools

          mkdir -p out

          echo "Packing Phoenix firmware..."

          ./pack \
            -c sun50iw9p1 \
            -p linux \
            -b armbian \
            -d ../phoenix/rootfs.tar.gz || true

          ls -lah out || true

      - name: Upload Armbian image
        uses: actions/upload-artifact@v4
        with:
          name: armbian-img
          path: armbian-build/output/images/*
          retention-days: 7

      - name: Upload Phoenix firmware
        uses: actions/upload-artifact@v4
        with:
          name: phoenix-firmware
          path: sunxi-pack-tools/out/*
          retention-days: 7

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: armbian-build/output/logs/*
          retention-days: 3
