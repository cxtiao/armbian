name: Build H618

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Free up disk space
        run: |
          echo "Disk space before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo apt-get autoclean
          sudo apt-get autoremove -y
          echo "Disk space after cleanup:"
          df -h

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl wget gcc g++ bc bison flex \
            make libssl-dev libncurses5-dev libncursesw5-dev \
            libreadline-dev ccache fakeroot libfile-fcntllock-perl \
            lzop dosfstools device-tree-compiler python3 python3-distutils \
            qemu-user-static binfmt-support

      - name: Clone Armbian build repository
        run: |
          git clone --depth=1 https://github.com/armbian/build.git armbian-build

      - name: Build Armbian firmware for H618
        run: |
          cd armbian-build
          sudo ./compile.sh \
            BOARD=orangepizero3 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            COMPRESS_OUTPUTIMAGE=gzip \
            DESKTOP_ENVIRONMENT_CONFIG_NAME=no \
            BSPFREEZE=yes
        timeout-minutes: 240

      - name: Check build output
        if: always()
        run: |
          ls -lah armbian-build/output/images/ || echo "No images directory"
          file armbian-build/output/images/* || echo "No files to check"

      - name: Upload Armbian image artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: armbian-h618-output
          path: armbian-build/output/images/*
          retention-days: 7

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: armbian-build/output/logs/*
          retention-days: 3
