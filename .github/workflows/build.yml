name: Build H618 PhoenixUSBPro Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo apt-get autoremove -y

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget gcc g++ bc bison flex make libssl-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev \
            ccache fakeroot lzop dosfstools device-tree-compiler \
            python3 python3-distutils qemu-user-static binfmt-support \
            parted kpartx e2fsprogs u-boot-tools libpython2.7-dev

      - name: Clone Orange Pi Build System
        # 使用官方维护的脚本，因为它包含了 H618 的 pack 工具和 FEX 配置
        run: |
          git clone --depth=1 https://github.com/orangepi-xunlong/orange-pi-build.git

      - name: Build Firmware
        run: |
          cd orange-pi-build
          # 关键参数：
          # BOARD=orangepizero3 (针对 H618)
          # BUILD_PHOENIX=yes (这会触发全志官方的打包逻辑，生成 .img 线刷包)
          sudo ./build.sh \
            BOARD=orangepizero3 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            BSP_FREEZE=yes \
            BUILD_PHOENIX=yes

      - name: Check Output
        run: |
          ls -R orange-pi-build/output/

      - name: Upload Phoenix Image
        uses: actions/upload-artifact@v4
        with:
          name: H618-Phoenix-Firmware
          # 注意：线刷镜像通常位于 output/images/ 目录下，文件名包含 'phoenix' 或以 '.img' 结尾
          path: orange-pi-build/output/images/*.img
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: orange-pi-build/output/debug/*.log
