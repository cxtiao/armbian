name: Build H618 PhoenixUSBPro Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo apt-get autoremove -y

      - name: Checkout current repository
        uses: actions/checkout@v4

      # 拉取 Orange Pi 编译工具
      - name: Checkout Orange Pi Build System
        uses: actions/checkout@v4
        with:
          repository: orangepi-xunlong/orange-pi-build
          path: orange-pi-build
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget gcc g++ bc bison flex make libssl-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev \
            ccache fakeroot lzop dosfstools device-tree-compiler \
            python3 python3-distutils qemu-user-static binfmt-support \
            parted kpartx e2fsprogs u-boot-tools libpython2.7-dev

      - name: Build Firmware
        run: |
          cd orange-pi-build
          # BUILD_PHOENIX=yes 会触发全志专用的打包脚本生成 .img 线刷包
          sudo ./build.sh \
            BOARD=orangepizero3 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            BSP_FREEZE=yes \
            BUILD_PHOENIX=yes \
            EXTER_COMMAND="none"

      - name: Check Output
        run: |
          echo "Checking for images in output directory..."
          ls -R orange-pi-build/output/images/ || true

      - name: Upload Phoenix Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: H618-Phoenix-Firmware
          # 匹配所有生成的 .img 文件（包含线刷包和常规包）
          path: orange-pi-build/output/images/*.img
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: orange-pi-build/output/debug/*.log
