name: Build H618 PhoenixUSBPro Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo apt-get clean
          sudo apt-get autoremove -y

      - name: Checkout current repository
        uses: actions/checkout@v4

      # 使用官方 Action 拉取 Orange Pi 编译工具，避免 Git 权限错误
      - name: Checkout Orange Pi Build System
        uses: actions/checkout@v4
        with:
          repository: orangepi-xunlong/orange-pi-build
          path: orange-pi-build
          fetch-depth: 1

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget gcc g++ bc bison flex make libssl-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev \
            ccache fakeroot lzop dosfstools device-tree-compiler \
            python3 python3-distutils qemu-user-static binfmt-support \
            parted kpartx e2fsprogs u-boot-tools libpython2.7-dev

      - name: Build Firmware
        run: |
          cd orange-pi-build
          # 使用 sudo 执行，并传入环境变量
          # BUILD_PHOENIX=yes 会生成 PhoenixUSBPro 专用的 .img
          # 这里增加了几个参数确保在 CI 环境下不进入交互菜单
          sudo ./build.sh \
            BOARD=orangepizero3 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            BSP_FREEZE=yes \
            BUILD_PHOENIX=yes \
            EXTER_COMMAND="none" 

      - name: Check Output
        run: |
          echo "Checking for Phoenix Image..."
          ls -lh orange-pi-build/output/images/ || true

      - name: Upload Phoenix Image
        uses: actions/checkout@v4
        # 如果编译成功，上传 output/images 下的所有 .img 文件
        # 线刷包通常文件名会包含 'phoenix' 字样
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: H618-Phoenix-Firmware
          path: orange-pi-build/output/images/*.img
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: orange-pi-build/output/debug/*.log
