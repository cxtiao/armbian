name: Build Armbian H618 Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo docker system prune -af

      - name: Restore Armbian cache
        uses: actions/cache@v4
        with:
          path: |
            cache
            output/debs
          key: armbian-cache-${{ runner.os }}

      - name: Pull Armbian build container
        run: |
          docker pull ghcr.io/armbian/build:latest

      - name: Build Armbian
        run: |
          docker run --rm --privileged \
            -v ${{ github.workspace }}:/armbian \
            ghcr.io/armbian/build:latest \
            bash -c "
              cd /armbian &&
              ./compile.sh \
                BOARD=orangepizero3 \
                BRANCH=current \
                RELEASE=bookworm \
                BUILD_MINIMAL=yes \
                BUILD_DESKTOP=no \
                KERNEL_CONFIGURE=no
            "

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: armbian-h618-image
          path: output/images/*

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Armbian H618 Build ${{ github.run_number }}
          files: output/images/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
