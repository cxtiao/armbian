name: Build H618 PhoenixUSBPro Firmware

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04
    # 添加权限声明，防止一些 API 访问限制
    permissions:
      contents: read
      packages: write

    steps:
      - name: Maximize build space
        run: |
          # 深度清理：GitHub 默认环境只有不到 20G，全志编译需要更多
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL /var/lib/docker
          sudo apt-get clean
          sudo apt-get autoremove -y
          df -h

      - name: Checkout current repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git curl wget gcc g++ bc bison flex make libssl-dev \
            libncurses5-dev libncursesw5-dev libreadline-dev \
            ccache fakeroot lzop dosfstools device-tree-compiler \
            python3 python3-distutils qemu-user-static binfmt-support \
            parted kpartx e2fsprogs u-boot-tools libpython2.7-dev

      - name: Clone Orange Pi Build System
        run: |
          # 使用 --progress 观察进度，并明确指定 https 路径
          # 添加 git 配置防止因环境问题弹出交互提示
          git config --global url."https://github.com/".insteadOf git@github.com:
          git clone --depth=1 https://github.com/orangepi-xunlong/orange-pi-build.git

      - name: Build Firmware
        run: |
          cd orange-pi-build
          # 关键：BUILD_PHOENIX=yes 
          # 注意：如果是 H618，Board 必须是 orangepizero3
          sudo ./build.sh \
            BOARD=orangepizero3 \
            BRANCH=current \
            RELEASE=bookworm \
            BUILD_MINIMAL=yes \
            BUILD_DESKTOP=no \
            KERNEL_CONFIGURE=no \
            BSP_FREEZE=yes \
            BUILD_PHOENIX=yes \
            EXTER_COMMAND="none"

      - name: Check Output
        run: |
          echo "Listing all generated images..."
          ls -lh orange-pi-build/output/images/ || true

      - name: Upload Phoenix Image
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: H618-Phoenix-Firmware
          # 注意：Phoenix 格式通常是 .img 结尾且体积较大
          path: orange-pi-build/output/images/*.img
          retention-days: 7

      - name: Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: orange-pi-build/output/debug/*.log
